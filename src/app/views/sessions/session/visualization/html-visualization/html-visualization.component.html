@if (state.isReady()) {
  <div>
    <div class="scroller">
      @if (src) {
        <iframe
          #htmlframe
          width="100%"
      [src]="wrapperUrl + '?location=' + src | trustedresource"
      scrolling="no"
      frameborder="0"
      (load)="run(htmlframe)"></iframe>
}
  </div>
</div>
} @else {

  <ch-status [state]="state"></ch-status>

}
