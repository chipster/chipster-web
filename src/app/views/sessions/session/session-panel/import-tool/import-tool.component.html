<div class="container" id="import_modal">
  <h4 class="modal-title">Import Tool</h4>
  <div class="row">
    <div class="modal-body">
      <div class="row">
        <div class="col-3">
          <h4>Tools</h4>
          <p>
            <angular2-multiselect [data]="dropdownList" [(ngModel)]="selectedItems" [settings]="dropdownSettings"
              (onSelect)="onItemSelect($event)" (onDeSelect)="OnItemDeSelect($event)"
              (onSelectAll)="onSelectAll($event)" (onDeSelectAll)="onDeSelectAll($event)"></angular2-multiselect>

          </p>
        </div>
        <div class="col-9">
          <h4>Select columns</h4>
          <ch-slickgrid-visualization [dataset]="dataset" [sessionData]="sessionData">>
          </ch-slickgrid-visualization>
        </div>
      </div>
    </div>

  </div>

</div>
