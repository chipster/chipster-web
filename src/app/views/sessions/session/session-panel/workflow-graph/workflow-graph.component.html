<section id="workflowvisualization"></section>
<ng-container *ngIf="showLegendPanel">
  <button
    type="button"
    class="label-legend"
    *ngIf="labelLegend.length > 0"
    (click)="openLabelsModal()">
    <span class="label-legend-title">Labels</span>
    <span class="label-legend-items">
      <span class="label-legend-item" *ngFor="let label of labelLegend">
        <span class="label-legend-dot" [style.background-color]="legendDotColor(label)"></span>
        <span class="label-legend-name">{{ label.name }}</span>
      </span>
    </span>
  </button>
  <button
    type="button"
    class="btn btn-sm btn-primary label-legend-add-button"
    *ngIf="labelLegend.length === 0"
    (click)="openLabelsModal()">
    + Add labels
  </button>
</ng-container>
