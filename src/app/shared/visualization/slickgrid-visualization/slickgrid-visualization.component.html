<div>
  <div class=row>
    <span>
      <button class="btn-sm menu-btn" (click)="selectIdentifierColumn()">Select Identifier</button>
      <button class="btn-sm menu-btn" (click)="selectSampleColumn()">Select Sample
      </button>
      <button class="btn-sm menu-btn" (click)="resetSelection()">Reset
      </button>
      <button class="btn-sm menu-btn" (click)="createNewDatasetFile()">Next
      </button>
    </span>
  </div>
  <div class=row>
    <h6>Selected Identifier colums are</h6>
    <ul>
      <li *ngFor="let item of identifierSelectionMap | keyvalue">
        {{item.key}} --> {{item.value}}
      </li>
    </ul>
    <h6>Selected sample colums are</h6>
    <ul>
      <li *ngFor="let item of sampleSelectionMap| keyvalue">
        {{item.key}} --> {{item.value}}
      </li>
    </ul>
  </div>
  <div class=row>
    <angular-slickgrid gridId="grid2" [columnDefinitions]="columnDefinitions" [gridOptions]="gridOptions"
      [dataset]="slickDataset" (onAngularGridCreated)="angularGridReady($event)"
      (sgOnCellChange)="onCellChanged($event.detail.eventData, $event.detail.args)"
      (sgOnClick)="onCellClicked($event.detail.eventData, $event.detail.args)"
      (sgOnHeaderClick)="onHeaderClicked($event.detail.eventData, $event.detail.args)"
      (sgOnSelectedRowsChanged)="onSelectedRowsChanged($event.detail.eventData, $event.detail.args)">
    </angular-slickgrid>
  </div>

</div>
